<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6750A4">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6750A4;
      --on-primary: #FFFFFF;
      --surface: #FEF7FF;
      --on-surface: #1D1B20;
      --outline: #79747E;
      --error: #B3261E;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 999px;
      
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      -webkit-font-smoothing: antialiased;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    
    .login-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-2xl);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    .app-logo {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      background: var(--primary);
      color: var(--on-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--spacing-xl);
      font-size: 32px;
    }
    
    .app-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: var(--spacing-sm);
    }
    
    .app-subtitle {
      color: var(--outline);
      margin-bottom: var(--spacing-xl);
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: var(--spacing-lg);
      text-align: left;
    }
    
    .form-label {
      display: block;
      margin-bottom: var(--spacing-sm);
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-input {
      width: 100%;
      padding: var(--spacing-md);
      border: 1px solid var(--outline);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-family: inherit;
      background: white;
      transition: border-color 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .password-container {
      position: relative;
    }
    
    .toggle-password {
      position: absolute;
      right: var(--spacing-md);
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--outline);
      cursor: pointer;
    }
    
    .login-button {
      width: 90%;
      padding: var(--spacing-lg);
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: var(--spacing-lg);
      transition: background-color 0.2s;
    }
    
    .login-button:active {
      background: color-mix(in srgb, var(--primary) 90%, black);
    }
    
    .error-message {
      color: var(--error);
      margin-top: var(--spacing-md);
      font-size: 14px;
      display: none;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
      font-size: 14px;
    }
    
    .forgot-password {
      text-align: center;
      margin-top: var(--spacing-lg);
    }
    
    .forgot-password a {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
    }
    
    .material-icons-round {
      font-family: 'Material Icons Round';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
    }
    
    /* Biometric Login */
    .biometric-login {
      margin-top: var(--spacing-xl);
      padding-top: var(--spacing-xl);
      border-top: 1px solid var(--outline);
    }
    
    .biometric-button {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-full);
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .biometric-button:active {
      background: var(--primary);
      color: var(--on-primary);
    }
    
    .biometric-label {
      margin-top: var(--spacing-sm);
      color: var(--outline);
      font-size: 12px;
    }
    
    /* Loading */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      color: white;
      flex-direction: column;
      gap: var(--spacing-md);
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius-full);
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #1D1B20;
        --on-surface: #E6E1E5;
      }
      
      .login-card {
        background: #2D2B30;
      }
      
      .form-input {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--on-surface);
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="app-logo">
        <span class="material-icons-round">track_changes</span>
      </div>
      
      <h1 class="app-title">TrackMaster</h1>
      <p class="app-subtitle">Timesheet Management System</p>
      
      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="username" placeholder="Enter your username" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-container">
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <span class="material-icons-round" id="toggleIcon">visibility_off</span>
            </button>
          </div>
        </div>
        
        <div class="remember-me">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <button class="login-button" onclick="login()">
          Login
        </button>
        
        <div class="forgot-password">
          <a href="#" onclick="forgotPassword()">Forgot password?</a>
        </div>
        
        <!-- Biometric Login (if available) -->
        <div class="biometric-login" id="biometricLogin" style="display: none;">
          <button type="button" class="biometric-button" onclick="biometricLogin()">
            <span class="material-icons-round">fingerprint</span>
          </button>
          <div class="biometric-label">Use biometric login</div>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Loading Overlay -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Logging in...</div>
  </div>
  
  <script>
    // Check for biometric authentication
    function checkBiometricSupport() {
      if (window.PublicKeyCredential) {
        // WebAuthn is supported
        document.getElementById('biometricLogin').style.display = 'block';
      }
      
      // Check for stored credentials
      const savedUsername = localStorage.getItem('savedUsername');
      const savedPassword = localStorage.getItem('savedPassword');
      
      if (savedUsername && savedPassword) {
        document.getElementById('username').value = savedUsername;
        document.getElementById('password').value = savedPassword;
        document.getElementById('rememberMe').checked = true;
      }
    }
    
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.textContent = 'visibility';
      } else {
        passwordInput.type = 'password';
        toggleIcon.textContent = 'visibility_off';
      }
    }
    
    // Login function
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const errorElement = document.getElementById('errorMessage');
      
      // Validate
      if (!username || !password) {
        showError('Please enter both username and password');
        return;
      }
      
      // Show loading
      document.getElementById('loading').style.display = 'flex';
      errorElement.style.display = 'none';
      
      try {
        const result = await google.script.run
          .withFailureHandler(handleLoginError)
          .handleLogin({
            username: username,
            password: password
          });
        
        if (result.success) {
          // Save credentials if remember me is checked
          if (rememberMe) {
            localStorage.setItem('savedUsername', username);
            localStorage.setItem('savedPassword', password);
          } else {
            localStorage.removeItem('savedUsername');
            localStorage.removeItem('savedPassword');
          }
          
          // Store session token
          if (result.token) {
            sessionStorage.setItem('sessionToken', result.token);
          }
          
          // Redirect to home
          window.location.href = '<?= appUrl ?>?path=home';
        } else {
          handleLoginError(result.message || 'Invalid credentials');
        }
      } catch (error) {
        handleLoginError(error);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }
    
    // Biometric login
    async function biometricLogin() {
      if (!window.PublicKeyCredential) {
        showError('Biometric authentication not supported');
        return;
      }
      
      try {
        // Try to get saved credentials
        const savedUsername = localStorage.getItem('savedUsername');
        const savedPassword = localStorage.getItem('savedPassword');
        
        if (savedUsername && savedPassword) {
          document.getElementById('username').value = savedUsername;
          document.getElementById('password').value = savedPassword;
          login();
        } else {
          showError('No saved credentials found');
        }
      } catch (error) {
        console.error('Biometric login error:', error);
        showError('Biometric authentication failed');
      }
    }
    
    // Error handling
    function handleLoginError(error) {
      console.error('Login error:', error);
      
      let errorMessage = 'Login failed. ';
      
      if (typeof error === 'string') {
        errorMessage += error;
      } else if (error.message) {
        errorMessage += error.message;
      } else {
        errorMessage += 'Please try again.';
      }
      
      showError(errorMessage);
    }
    
    function showError(message) {
      const errorElement = document.getElementById('errorMessage');
      errorElement.textContent = message;
      errorElement.style.display = 'block';
      
      // Shake animation
      errorElement.style.animation = 'none';
      setTimeout(() => {
        errorElement.style.animation = 'shake 0.5s';
      }, 10);
    }
    
    // Forgot password
    function forgotPassword() {
      const username = document.getElementById('username').value.trim();
      
      if (!username) {
        showError('Please enter your username first');
        return;
      }
      
      // In a real app, this would send a password reset email
      alert(`Password reset instructions would be sent to the email associated with "${username}".\n\nFor now, please contact your administrator.`);
    }
    
    // Enter key to submit
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
    
    // CSS for shake animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }
    `;
    document.head.appendChild(style);
    
    // Initialize on load
    window.onload = function() {
      checkBiometricSupport();
      
      // Auto-focus username field
      document.getElementById('username').focus();
    };
  </script>
</body>
</html>
