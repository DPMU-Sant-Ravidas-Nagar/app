<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6750A4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrackMaster">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  <link rel="apple-touch-icon" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  
  <!-- Preconnect for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Additional styles */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding: 5px 0;
    }
    
    .filter-chip {
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--surface-container);
      border: none;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
    }
    
    .filter-chip.active {
      background: var(--primary);
      color: white;
    }
    
    .badge {
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
    
    .activity-item.pending {
      border-left-color: var(--warning);
    }
    
    .report-types {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .report-type-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .report-type-card.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    .report-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 20px;
    }
    
    .report-type-card.selected .report-icon {
      background: var(--primary);
      color: white;
    }
    
    .date-range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .format-options {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    
    .format-option {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--outline);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .format-option.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    .format-icon {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--outline);
    }
    
    .format-option.selected .format-icon {
      color: var(--primary);
    }
    
    .report-preview {
      background: var(--surface-container);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .preview-content {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--outline);
      border-radius: 8px;
      padding: 12px;
      background: var(--surface);
    }
    
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    
    .preview-table th {
      background: var(--primary-light);
      color: var(--primary);
      padding: 8px;
      text-align: left;
      border-bottom: 2px solid var(--primary);
    }
    
    .preview-table td {
      padding: 8px;
      border-bottom: 1px solid var(--outline);
    }
    
    .recent-reports {
      background: var(--surface-container);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-top: 24px;
    }
    
    .reports-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    
    .report-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
    }
    
    .report-item-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--primary-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .report-item-info {
      flex: 1;
    }
    
    .report-item-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }
    
    .report-item-details {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--outline);
    }
    
    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: none;
      color: var(--outline);
      cursor: pointer;
    }
    
    .more-menu {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }
    
    .more-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
      padding: var(--spacing-lg);
      background: var(--surface-container);
      border-radius: var(--radius-md);
      cursor: pointer;
    }
    
    .more-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--primary-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .more-content {
      flex: 1;
    }
    
    .more-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .more-subtitle {
      font-size: 12px;
      color: var(--outline);
    }
    
    .info-grid {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: var(--spacing-sm) 0;
      border-bottom: 1px solid var(--outline);
    }
    
    .error-container {
      text-align: center;
      padding: 40px 20px;
    }
    
    .error-icon {
      font-size: 48px;
      color: var(--error);
      margin-bottom: 16px;
    }
    
    .retry-button {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <!-- App Bar -->
      <div class="app-bar">
        <div class="app-bar-content">
          <div class="app-title">TrackMaster</div>
        </div>
        <div class="app-actions">
          <button class="icon-button" onclick="refreshData()" title="Refresh">
            <span class="material-icons-round">refresh</span>
          </button>
          <button class="icon-button" onclick="showNotifications()" title="Notifications">
            <span class="material-icons-round">notifications</span>
          </button>
          <button class="icon-button" onclick="logout()" title="Logout">
            <span class="material-icons-round">logout</span>
          </button>
        </div>
      </div>
      
      <!-- Offline Indicator -->
      <div id="offlineIndicator" class="offline-indicator" style="display: none;">
        <span class="material-icons-round">cloud_off</span>
        You're offline
      </div>
      
      <!-- Main Content -->
      <div class="main-content">
        <div class="page-container">
          <div class="page" id="currentPage"></div>
        </div>
      </div>
      
      <!-- Floating Action Button -->
      <button class="fab" onclick="window.location.href='newactivity.html'" title="New Activity">
        <span class="material-icons-round">add</span>
      </button>
      
      <!-- Bottom Navigation -->
      <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="navigateTo('home'); return false;">
          <span class="material-icons-round nav-icon">home</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('myactivity'); return false;">
          <span class="material-icons-round nav-icon">list_alt</span>
          <span class="nav-label">Activity</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('myteam'); return false;">
          <span class="material-icons-round nav-icon">groups</span>
          <span class="nav-label">Team</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('reports'); return false;">
          <span class="material-icons-round nav-icon">download</span>
          <span class="nav-label">Reports</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('more'); return false;">
          <span class="material-icons-round nav-icon">more_horiz</span>
          <span class="nav-label">More</span>
        </a>
      </div>
    </div>
    
    <!-- Install Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
      <div class="install-header">
        <div class="install-icon">
          <span class="material-icons-round">install_mobile</span>
        </div>
        <div>
          <div class="install-title">Install TrackMaster</div>
          <div class="install-subtitle">Add to home screen</div>
        </div>
      </div>
      <div class="install-actions">
        <button class="btn btn-primary" style="flex: 1;" onclick="installApp()">Install</button>
        <button class="btn btn-secondary" style="flex: 1;" onclick="dismissInstall()">Not Now</button>
      </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>
  
  <script src="api.js"></script>
  <script>
    // App State
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      deferredPrompt: null,
      currentPage: 'home',
      offlineActivities: JSON.parse(localStorage.getItem('offlineActivities') || '[]'),
      recentReports: JSON.parse(localStorage.getItem('recentReports') || '[]'),
      reportType: 'weekly',
      format: 'pdf',
      previewData: null
    };
    
    // Page Cache
    const pageCache = new Map();
    
    // Check authentication
    function checkAuth() {
      const savedUser = localStorage.getItem('trackmaster_user');
      const sessionUser = sessionStorage.getItem('trackmaster_session');
      
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          if (Date.now() < (userData.expiry || 0)) {
            appState.currentUser = userData;
            return true;
          }
        } catch (e) {}
      } else if (sessionUser) {
        try {
          appState.currentUser = JSON.parse(sessionUser);
          return true;
        } catch (e) {}
      }
      
      window.location.href = 'login.html';
      return false;
    }
    
    // Initialize App
    async function initApp() {
      if (!checkAuth()) return;
      
      setupEventListeners();
      registerServiceWorker();
      
      const hash = window.location.hash.substring(1);
      const initialPage = hash || 'home';
      
      updateActiveNav(initialPage);
      await navigateTo(initialPage, false);
      
      setTimeout(checkInstallPrompt, 3000);
    }
    
    // Register Service Worker
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.log('ServiceWorker registration failed:', err);
        });
      }
    }
    
    // Setup event listeners
    function setupEventListeners() {
      window.addEventListener('online', () => {
        appState.isOnline = true;
        document.getElementById('offlineIndicator').style.display = 'none';
        showToast('You are back online!', 'success');
        syncOfflineActivities();
      });
      
      window.addEventListener('offline', () => {
        appState.isOnline = false;
        document.getElementById('offlineIndicator').style.display = 'flex';
        showToast('You are offline', 'warning');
      });
      
      window.addEventListener('popstate', (e) => {
        const page = e.state?.page || 'home';
        navigateTo(page, false);
      });
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        appState.deferredPrompt = e;
      });
    }
    
    // Update active navigation
    function updateActiveNav(page) {
      const navMap = { home: 0, myactivity: 1, myteam: 2, reports: 3, more: 4 };
      document.querySelectorAll('.nav-item').forEach((item, index) => {
        if (index === navMap[page]) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }
    
    // Navigation
    async function navigateTo(page, addToHistory = true) {
      event?.preventDefault();
      
      appState.currentPage = page;
      updateActiveNav(page);
      
      if (addToHistory) {
        history.pushState({ page }, '', '#' + page);
      }
      
      const container = document.getElementById('currentPage');
      
      // Show loading
      container.innerHTML = `
        <div class="card">
          <div class="loading">Loading...</div>
        </div>
      `;
      
      await loadPageContent(page);
    }
    
    // Load page content
    async function loadPageContent(page) {
      const container = document.getElementById('currentPage');
      
      try {
        let html = '';
        
        switch(page) {
          case 'home':
            html = await loadDashboard();
            break;
          case 'myactivity':
            html = await loadMyActivity();
            break;
          case 'myteam':
            html = await loadMyTeam();
            break;
          case 'reports':
            html = loadReports();
            break;
          case 'more':
            html = loadMore();
            break;
        }
        
        pageCache.set(page, html);
        container.innerHTML = html;
        
        // Initialize page-specific functions
        if (page === 'reports') initReportsPage();
        
      } catch (error) {
        console.error('Error loading page:', error);
        container.innerHTML = `
          <div class="card error-container">
            <span class="material-icons-round error-icon">error</span>
            <h3>Failed to Load</h3>
            <p style="color: var(--outline); margin: 16px 0;">${error.message || 'Unknown error'}</p>
            <button class="btn btn-primary retry-button" onclick="navigateTo('${page}')">
              Retry
            </button>
          </div>
        `;
      }
    }
    
    // Load Dashboard
    async function loadDashboard() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      try {
        const result = await API.getDashboardStats(appState.currentUser.staffId);
        
        if (result.success) {
          const stats = result.stats || {};
          return `
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <span class="material-icons-round">dashboard</span>
                  Welcome, ${escapeHtml(appState.currentUser.name)}
                </h3>
              </div>
              <div class="stats-grid">
                <div class="stat-card">
                  <div class="stat-value">${stats.weekly || 0}</div>
                  <div class="stat-label">This Week</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.monthly || 0}</div>
                  <div class="stat-label">This Month</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.total || 0}</div>
                  <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.pending || 0}</div>
                  <div class="stat-label">Pending</div>
                </div>
              </div>
            </div>
          `;
        }
        return '<div class="card">No data available</div>';
      } catch (error) {
        console.error('Dashboard error:', error);
        return '<div class="card">Error loading dashboard</div>';
      }
    }
    
    // Load My Activity - FIXED
    async function loadMyActivity() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      try {
        console.log('Loading activities for:', appState.currentUser.staffId);
        const result = await API.getUserActivities(appState.currentUser.staffId, 'all');
        console.log('Activities result:', result);
        
        if (result.success && result.activities && result.activities.length > 0) {
          // Group by month
          const grouped = {};
          result.activities.forEach(activity => {
            if (!activity.date) return;
            const date = new Date(activity.date);
            const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
            if (!grouped[monthYear]) grouped[monthYear] = [];
            grouped[monthYear].push(activity);
          });
          
          let html = `
            <div class="filter-bar">
              <button class="filter-chip active" onclick="filterActivities('all')">All</button>
              <button class="filter-chip" onclick="filterActivities('weekly')">This Week</button>
              <button class="filter-chip" onclick="filterActivities('monthly')">This Month</button>
            </div>
          `;
          
          Object.entries(grouped).forEach(([month, activities]) => {
            html += `
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">${month}</h3>
                  <span class="badge">${activities.length} activities</span>
                </div>
                <div class="activity-list">
                  ${activities.map(a => `
                    <div class="activity-item ${a.status === 'Pending Approval' ? 'pending' : ''}" onclick="editActivity('${a.rowId}')">
                      <div class="activity-header">
                        <span class="activity-date">${a.date || 'No date'}</span>
                        <span class="activity-day" style="color: ${a.status === 'Approved' ? 'var(--success)' : 'var(--warning)'}">
                          ${a.status || 'Unknown'}
                        </span>
                      </div>
                      <div class="activity-description">${escapeHtml(a.description || 'No description')}</div>
                      <div class="activity-meta">
                        ${a.location ? `
                          <span class="activity-meta-item">
                            <span class="material-icons-round">location_on</span>
                            ${a.location}
                          </span>
                        ` : ''}
                        <span class="activity-meta-item">
                          <span class="material-icons-round">groups</span>
                          ${a.teamMembers?.length || 1} member(s)
                        </span>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          });
          
          return html;
        }
        
        // No activities
        return `
          <div class="card">
            <div style="text-align: center; padding: 40px 20px;">
              <span class="material-icons-round" style="font-size: 48px; color: var(--outline);">assignment</span>
              <h3>No Activities Found</h3>
              <p style="color: var(--outline); margin: 20px 0;">Start by adding your first activity</p>
              <button class="btn btn-primary" onclick="window.location.href='newactivity.html'">
                <span class="material-icons-round">add</span>
                Add New Activity
              </button>
            </div>
          </div>
        `;
      } catch (error) {
        console.error('Activity error:', error);
        return `
          <div class="card error-container">
            <span class="material-icons-round error-icon">error</span>
            <h3>Failed to Load Activities</h3>
            <p style="color: var(--outline); margin: 16px 0;">${error.message}</p>
            <button class="btn btn-primary retry-button" onclick="loadPageContent('myactivity')">
              Retry
            </button>
          </div>
        `;
      }
    }
    
    // Load My Team - FIXED with all columns
    async function loadMyTeam() {
      try {
        console.log('Loading team members...');
        const result = await API.getTeamMembers();
        console.log('Team result:', result);
        
        if (result.success && result.members && result.members.length > 0) {
          return `
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <span class="material-icons-round">groups</span>
                  Team Members (${result.members.length})
                </h3>
              </div>
              <div class="team-grid">
                ${result.members.map(member => `
                  <div class="team-member">
                    <div class="member-header">
                      <div class="member-avatar" style="background: ${getAvatarColor(member.staffId || '')}">
                        ${getInitials(member.name)}
                      </div>
                      <div class="member-info">
                        <h4>${escapeHtml(member.name || 'Unknown')}</h4>
                        <div class="member-role">${escapeHtml(member.designation || 'Team Member')}</div>
                      </div>
                    </div>
                    <div style="margin-top: 12px; font-size: 13px;">
                      <div style="margin-bottom: 4px;"><strong>ID:</strong> ${escapeHtml(member.staffId || 'N/A')}</div>
                      <div style="margin-bottom: 4px;"><strong>Contact:</strong> ${escapeHtml(member.contactNo || 'N/A')}</div>
                      <div style="margin-bottom: 4px;"><strong>Email:</strong> ${escapeHtml(member.email || 'N/A')}</div>
                      <div><strong>Role:</strong> ${escapeHtml(member.role || 'User')}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }
        
        return `
          <div class="card">
            <div style="text-align: center; padding: 40px;">
              <span class="material-icons-round" style="font-size: 48px; color: var(--outline);">groups</span>
              <h3>No Team Members Found</h3>
            </div>
          </div>
        `;
      } catch (error) {
        console.error('Team error:', error);
        return `
          <div class="card error-container">
            <span class="material-icons-round error-icon">error</span>
            <h3>Failed to Load Team</h3>
            <p style="color: var(--outline); margin: 16px 0;">${error.message}</p>
            <button class="btn btn-primary retry-button" onclick="loadPageContent('myteam')">
              Retry
            </button>
          </div>
        `;
      }
    }
    
    // Filter activities
    async function filterActivities(filter) {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.remove('active');
      });
      event.target.classList.add('active');
      
      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, filter);
        
        if (result.success) {
          pageCache.delete('myactivity');
          await loadPageContent('myactivity');
        }
      } catch (error) {
        showToast('Error filtering activities', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }
    
    // Load Reports
    function loadReports() {
      return `
        <div class="report-types">
          <div class="report-type-card selected" onclick="selectReportType('weekly', this)">
            <div class="report-icon">
              <i class="fas fa-calendar-week"></i>
            </div>
            <div class="report-title">Weekly Timesheet</div>
            <div class="report-desc">Last 7 days summary</div>
          </div>
          
          <div class="report-type-card" onclick="selectReportType('monthly', this)">
            <div class="report-icon">
              <i class="fas fa-calendar-alt"></i>
            </div>
            <div class="report-title">Monthly Report</div>
            <div class="report-desc">Complete month summary</div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">settings</span>
              Report Configuration
            </h3>
          </div>
          
          <div class="form-group">
            <label class="form-label required">Date Range</label>
            <div class="date-range">
              <div>
                <label style="font-size: 12px; color: var(--outline);">Start Date</label>
                <input type="date" class="form-input" id="startDate" required>
              </div>
              <div>
                <label style="font-size: 12px; color: var(--outline);">End Date</label>
                <input type="date" class="form-input" id="endDate" required>
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label required">Format</label>
            <div class="format-options">
              <div class="format-option ${appState.format === 'pdf' ? 'selected' : ''}" onclick="selectFormat('pdf')">
                <div class="format-icon">
                  <i class="fas fa-file-pdf"></i>
                </div>
                <div class="format-name">PDF</div>
              </div>
              
              <div class="format-option ${appState.format === 'excel' ? 'selected' : ''}" onclick="selectFormat('excel')">
                <div class="format-icon">
                  <i class="fas fa-file-excel"></i>
                </div>
                <div class="format-name">Excel</div>
              </div>
              
              <div class="format-option ${appState.format === 'csv' ? 'selected' : ''}" onclick="selectFormat('csv')">
                <div class="format-icon">
                  <i class="fas fa-file-csv"></i>
                </div>
                <div class="format-name">CSV</div>
              </div>
            </div>
          </div>
          
          <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
            <button class="btn btn-secondary btn-full" onclick="previewReport()">
              <span class="material-icons-round">visibility</span>
              Preview
            </button>
            <button class="btn btn-primary btn-full" onclick="generateReport()">
              <span class="material-icons-round">download</span>
              Download
            </button>
          </div>
        </div>
        
        <div class="report-preview" id="reportPreview" style="display: none;">
          <div class="preview-header">
            <h3>Report Preview</h3>
            <button class="action-btn" onclick="closePreview()">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="preview-content" id="previewContent"></div>
        </div>
        
        <div class="recent-reports">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">history</span>
              Recent Reports
            </h3>
          </div>
          
          <div class="reports-list" id="recentReportsList">
            ${renderRecentReports()}
          </div>
        </div>
      `;
    }
    
    // Load More
    function loadMore() {
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">person</span>
              Profile
            </h3>
          </div>
          <div style="display: flex; align-items: center; gap: var(--spacing-lg); padding: var(--spacing-md);">
            <div class="member-avatar" style="width: 64px; height: 64px; font-size: 24px; background: var(--primary);">
              ${getInitials(appState.currentUser?.name)}
            </div>
            <div>
              <h4>${escapeHtml(appState.currentUser?.name || 'User')}</h4>
              <div style="color: var(--outline);">${escapeHtml(appState.currentUser?.staffId || '')}</div>
              <div style="color: var(--outline);">${escapeHtml(appState.currentUser?.designation || '')}</div>
            </div>
          </div>
        </div>
        
        <div class="more-menu">
          <div class="more-item" onclick="showProfile()">
            <div class="more-icon"><span class="material-icons-round">edit</span></div>
            <div class="more-content">
              <div class="more-title">Edit Profile</div>
              <div class="more-subtitle">Update your information</div>
            </div>
          </div>
          
          <div class="more-item" onclick="showNotificationsSettings()">
            <div class="more-icon"><span class="material-icons-round">notifications</span></div>
            <div class="more-content">
              <div class="more-title">Notifications</div>
              <div class="more-subtitle">Manage preferences</div>
            </div>
          </div>
          
          <div class="more-item" onclick="showPrivacySettings()">
            <div class="more-icon"><span class="material-icons-round">security</span></div>
            <div class="more-content">
              <div class="more-title">Privacy & Security</div>
              <div class="more-subtitle">Manage settings</div>
            </div>
          </div>
          
          <div class="more-item" onclick="showHelp()">
            <div class="more-icon"><span class="material-icons-round">help</span></div>
            <div class="more-content">
              <div class="more-title">Help & Support</div>
              <div class="more-subtitle">FAQs and support</div>
            </div>
          </div>
          
          <div class="more-item" onclick="clearCache()">
            <div class="more-icon"><span class="material-icons-round">delete</span></div>
            <div class="more-content">
              <div class="more-title">Clear Cache</div>
              <div class="more-subtitle">Free up space</div>
            </div>
          </div>
          
          <div class="more-item" onclick="showAbout()">
            <div class="more-icon"><span class="material-icons-round">info</span></div>
            <div class="more-content">
              <div class="more-title">About</div>
              <div class="more-subtitle">Version 1.0.0</div>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Storage Info</h3>
          </div>
          <div class="info-grid">
            <div class="info-row">
              <span class="info-label">Offline Activities</span>
              <span class="info-value">${appState.offlineActivities.length}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Recent Reports</span>
              <span class="info-value">${appState.recentReports.length}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Storage Used</span>
              <span class="info-value">${(JSON.stringify(localStorage).length / 1024).toFixed(2)} KB</span>
            </div>
          </div>
        </div>
      `;
    }
    
    // Render recent reports
    function renderRecentReports() {
      if (!appState.recentReports || appState.recentReports.length === 0) {
        return `<div style="text-align: center; padding: 20px; color: var(--outline);">No recent reports</div>`;
      }
      
      return appState.recentReports.slice(0, 5).map((report, index) => {
        const icon = report.format === 'pdf' ? 'file-pdf' : 
                    report.format === 'excel' ? 'file-excel' : 'file-csv';
        
        return `
          <div class="report-item">
            <div class="report-item-icon"><i class="fas fa-${icon}"></i></div>
            <div class="report-item-info">
              <div class="report-item-name">${report.name || 'Report'}</div>
              <div class="report-item-details">
                <span>${report.type || 'Report'}</span>
                <span>${report.date || ''}</span>
              </div>
            </div>
            <div class="report-item-actions">
              <button class="action-btn" onclick="downloadRecentReport(${index})">
                <i class="fas fa-download"></i>
              </button>
              <button class="action-btn" onclick="deleteRecentReport(${index})">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Report Functions
    function selectReportType(type) {
      appState.reportType = type;
      document.querySelectorAll('.report-type-card').forEach(c => c.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - (type === 'weekly' ? 7 : 30));
      
      document.getElementById('startDate').valueAsDate = startDate;
      document.getElementById('endDate').valueAsDate = today;
    }
    
    function selectFormat(format) {
      appState.format = format;
      document.querySelectorAll('.format-option').forEach(o => o.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }
    
    function initReportsPage() {
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - 7);
      
      const startInput = document.getElementById('startDate');
      const endInput = document.getElementById('endDate');
      
      if (startInput && endInput) {
        startInput.valueAsDate = startDate;
        endInput.valueAsDate = today;
      }
    }
    
    async function previewReport() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      
      if (!startDate || !endDate) {
        showToast('Select dates', 'error');
        return;
      }
      
      showLoading('Loading preview...');
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, 'all');
        
        if (result.success) {
          const start = new Date(startDate);
          const end = new Date(endDate);
          
          const filtered = (result.activities || []).filter(a => {
            const ad = new Date(a.date);
            return ad >= start && ad <= end;
          });
          
          const previewContent = document.getElementById('previewContent');
          
          if (filtered.length === 0) {
            previewContent.innerHTML = '<div style="text-align: center; padding: 20px;">No activities found</div>';
          } else {
            previewContent.innerHTML = `
              <table class="preview-table">
                <thead><tr><th>Date</th><th>Description</th><th>Status</th></tr></thead>
                <tbody>
                  ${filtered.slice(0, 10).map(a => `
                    <tr>
                      <td>${a.date}</td>
                      <td>${escapeHtml(a.description).substring(0, 30)}</td>
                      <td>${a.status}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
              ${filtered.length > 10 ? `<div style="margin-top: 8px;">... and ${filtered.length - 10} more</div>` : ''}
            `;
          }
          
          document.getElementById('reportPreview').style.display = 'block';
        }
      } catch (error) {
        showToast('Preview failed', 'error');
      } finally {
        hideLoading();
      }
    }
    
    function closePreview() {
      document.getElementById('reportPreview').style.display = 'none';
    }
    
    async function generateReport() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      
      if (!startDate || !endDate) {
        showToast('Select dates', 'error');
        return;
      }
      
      showLoading('Generating...');
      
      try {
        const result = await API.generateReport(
          appState.currentUser.staffId,
          appState.reportType,
          appState.format,
          startDate,
          endDate
        );
        
        if (result.success) {
          const report = {
            id: Date.now(),
            name: `${appState.reportType} Report`,
            type: appState.reportType,
            format: appState.format,
            date: new Date().toLocaleDateString()
          };
          
          appState.recentReports.unshift(report);
          if (appState.recentReports.length > 10) appState.recentReports.pop();
          localStorage.setItem('recentReports', JSON.stringify(appState.recentReports));
          
          document.getElementById('recentReportsList').innerHTML = renderRecentReports();
          showToast('Report generated', 'success');
        }
      } catch (error) {
        showToast('Generation failed', 'error');
      } finally {
        hideLoading();
      }
    }
    
    function downloadRecentReport(index) {
      showToast('Downloading...', 'info');
    }
    
    function deleteRecentReport(index) {
      if (confirm('Delete this report?')) {
        appState.recentReports.splice(index, 1);
        localStorage.setItem('recentReports', JSON.stringify(appState.recentReports));
        document.getElementById('recentReportsList').innerHTML = renderRecentReports();
        showToast('Report deleted', 'success');
      }
    }
    
    // More functions
    function showProfile() { showToast('Profile settings', 'info'); }
    function showNotificationsSettings() { showToast('Notifications settings', 'info'); }
    function showPrivacySettings() { showToast('Privacy settings', 'info'); }
    function showHelp() { window.open('mailto:support@trackmaster.com'); }
    function showAbout() { showToast('TrackMaster v1.0.0', 'info'); }
    
    function clearCache() {
      if (confirm('Clear cache?')) {
        pageCache.clear();
        API.cache?.clear();
        appState.offlineActivities = [];
        localStorage.removeItem('offlineActivities');
        showToast('Cache cleared', 'success');
        loadPageContent('more');
      }
    }
    
    // Helper functions
    function getInitials(name) {
      if (!name) return 'U';
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }
    
    function getAvatarColor(id) {
      const colors = ['#6750A4', '#0D904F', '#DC3545', '#FFC107', '#17A2B8'];
      const index = (id || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % colors.length;
      return colors[index];
    }
    
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return String(unsafe)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    function editActivity(rowId) {
      sessionStorage.setItem('editActivityId', rowId);
      window.location.href = 'newactivity.html?edit=' + rowId;
    }
    
    function showNotifications() {
      showToast('No new notifications', 'info');
    }
    
    function checkInstallPrompt() {
      if (appState.deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
        document.getElementById('installPrompt').style.display = 'block';
      }
    }
    
    function installApp() {
      if (appState.deferredPrompt) {
        appState.deferredPrompt.prompt();
        appState.deferredPrompt = null;
        document.getElementById('installPrompt').style.display = 'none';
      }
    }
    
    function dismissInstall() {
      document.getElementById('installPrompt').style.display = 'none';
      localStorage.setItem('installPromptDismissed', Date.now());
    }
    
    async function syncOfflineActivities() {
      if (appState.offlineActivities.length > 0) {
        for (const activity of appState.offlineActivities) {
          try { await API.saveActivity(activity); } catch (e) {}
        }
        appState.offlineActivities = [];
        localStorage.removeItem('offlineActivities');
        showToast('Sync completed', 'success');
      }
    }
    
    function showLoading(text) {
      document.getElementById('loadingText').textContent = text || 'Loading...';
      document.getElementById('loading').style.display = 'flex';
    }
    
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
    
    function refreshData() {
      pageCache.clear();
      API.cache?.clear();
      loadPageContent(appState.currentPage);
      showToast('Refreshed', 'success');
    }
    
    function logout() {
      if (confirm('Logout?')) {
        localStorage.removeItem('trackmaster_user');
        sessionStorage.removeItem('trackmaster_session');
        window.location.href = 'login.html';
      }
    }
    
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    window.onload = initApp;
  </script>
</body>
</html>
