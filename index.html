<!DOCTYPE html>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrackMaster">
  <meta name="format-detection" content="telephone=no">

  <style>
    /* Additional styles for team grid */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-md);
    }
    
    .team-member {
      background: white;
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-1);
      transition: transform 0.2s;
    }
    
    .team-member:active {
      transform: scale(0.98);
    }
    
    .member-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    
    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--primary-container);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
    }
    
    .member-info h4 {
      font-weight: 600;
      margin-bottom: 2px;
      font-size: 16px;
    }
    
    .member-role {
      font-size: 12px;
      color: var(--outline);
    }
    
    .member-id {
      font-weight: 600;
      color: var(--primary);
      font-size: 14px;
      margin-top: var(--spacing-sm);
    }
    
    /* Install prompt styles */
    .install-prompt {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: var(--spacing-lg);
      right: var(--spacing-lg);
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-4);
      z-index: 2000;
      animation: slideUp 0.3s ease;
      border: 1px solid rgba(0, 0, 0, 0.1);
      max-width: 480px;
      margin: 0 auto;
    }
    
    .install-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    
    .install-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .install-title {
      font-weight: 600;
      font-size: 16px;
    }
    
    .install-subtitle {
      color: var(--outline);
      font-size: 14px;
    }
    
    .install-actions {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }
    
    @media (prefers-color-scheme: dark) {
      .team-member {
        background: var(--surface-container);
      }
      
      .install-prompt {
        background: var(--surface-container);
        border-color: rgba(255, 255, 255, 0.1);
      }
    }
  </style>
</head>

  <script>
    // App State
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      deferredPrompt: null,
      currentPage: 'home',
      isLoading: false,
      offlineActivities: JSON.parse(localStorage.getItem('offlineActivities') || '[]'),
      recentReports: JSON.parse(localStorage.getItem('recentReports') || '[]'),
      reportType: 'weekly',
      format: 'pdf',
      previewData: null
    };
    
    // Check authentication
    function checkAuth() {
      const savedUser = localStorage.getItem('trackmaster_user');
      const sessionUser = sessionStorage.getItem('trackmaster_session');
      
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          const expiryTime = userData.expiry || 0;
          
          if (Date.now() < expiryTime) {
            appState.currentUser = userData;
            return true;
          } else {
            localStorage.removeItem('trackmaster_user');
          }
        } catch (e) {
          console.error('Error parsing saved user:', e);
        }
      } else if (sessionUser) {
        try {
          appState.currentUser = JSON.parse(sessionUser);
          return true;
        } catch (e) {
          console.error('Error parsing session user:', e);
        }
      }
      
      // No valid session, redirect to login
      window.location.href = 'login.html';
      return false;
    }
    
    // Initialize App
    async function initApp() {
      // Check authentication first
      if (!checkAuth()) return;
      
      // Register Service Worker
      registerServiceWorker();
      
      // Setup event listeners
      setupEventListeners();
      
      // Load initial page
      await loadPage('home');
      
      // Show install prompt if applicable
      setTimeout(checkInstallPrompt, 3000);
    }
    
    // Service Worker Registration
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
          .then(registration => {
            console.log('Service Worker registered:', registration);
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      }
    }
    
    // Setup Event Listeners
    function setupEventListeners() {
      // Network status
      window.addEventListener('online', () => {
        appState.isOnline = true;
        document.getElementById('offlineIndicator').style.display = 'none';
        showToast('You are back online!', 'success');
        syncOfflineData();
      });
      
      window.addEventListener('offline', () => {
        appState.isOnline = false;
        document.getElementById('offlineIndicator').style.display = 'flex';
        showToast('You are offline - Changes will sync when online', 'warning');
      });
      
      // Install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        appState.deferredPrompt = e;
      });
      
      window.addEventListener('appinstalled', () => {
        appState.deferredPrompt = null;
        showToast('App installed successfully!', 'success');
      });
      
      // Back button handling
      window.addEventListener('popstate', (e) => {
        if (e.state && e.state.page) {
          loadPage(e.state.page, false);
        }
      });
    }
    
    // Navigation
    function navigateTo(page, event) {
      if (event) {
        event.preventDefault();
      }
      
      // Update active nav item
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      event.currentTarget.classList.add('active');
      
      // Update state and load page
      appState.currentPage = page;
      window.history.pushState({ page }, '', `#${page}`);
      loadPage(page);
    }
    
    async function loadPage(page) {
      if (appState.isLoading) return;
      
      appState.isLoading = true;
      const pageContainer = document.getElementById('currentPage');
      
      // Show loading skeleton
      pageContainer.innerHTML = `
        <div class="card">
          <div class="skeleton" style="height: 24px; width: 60%; margin-bottom: 16px;"></div>
          <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 80px;"></div>
        </div>
      `;
      
      try {
        let html = '';
        
        switch(page) {
          case 'home':
            html = await loadDashboard();
            break;
          case 'myactivity':
            html = await loadMyActivity();
            break;
          case 'myteam':
            html = await loadMyTeam();
            break;
          case 'download':
            html = await loadDownload();
            setTimeout(() => initDownloadPage(), 100);
            break;
          case 'more':
            html = await loadMore();
            break;
          default:
            html = await loadDashboard();
        }
        
        pageContainer.innerHTML = html;
        
        // Initialize page-specific functionality
        if (page === 'download') {
          initDownloadPage();
        }
        
      } catch (error) {
        console.error('Error loading page:', error);
        pageContainer.innerHTML = `
          <div class="card">
            <div style="text-align: center; padding: 40px;">
              <span class="material-icons-round" style="font-size: 48px; color: var(--error);">error</span>
              <p style="margin-top: 16px; color: var(--outline);">Failed to load page. Please try again.</p>
              <button class="btn btn-primary" onclick="loadPage('${page}')" style="margin-top: 16px;">Retry</button>
            </div>
          </div>
        `;
      } finally {
        appState.isLoading = false;
      }
    }

    async function loadDownload() {

      const recentReports = JSON.parse(localStorage.getItem('recentReports') || '[]');

          </div>
          
          <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
            <button class="btn btn-secondary btn-full" onclick="previewReport()">
              <span class="material-icons-round">visibility</span>
              Preview
            </button>
            <button class="btn btn-primary btn-full" onclick="generateReport()">
              <span class="material-icons-round">download</span>
              Download
            </button>
          </div>
        </div>
        
        <!-- Report Preview -->
        <div class="report-preview" id="reportPreview" style="display: none;">
          <div class="preview-header">
            <h3>Report Preview</h3>
            <button class="action-btn" onclick="closePreview()">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="preview-content" id="previewContent"></div>
        </div>
        
        <!-- Recent Reports -->
        <div class="recent-reports">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">history</span>
              Recent Reports
            </h3>
          </div>
          
          <div class="reports-list" id="recentReports">
            ${renderRecentReports(recentReports)}
          </div>
        </div>
      `;
    }
    
    function renderRecentReports(reports) {
      if (!reports || reports.length === 0) {
        return `
          <div style="text-align: center; padding: 20px; color: var(--gray);">
            <i class="fas fa-file" style="font-size: 24px; margin-bottom: 8px; opacity: 0.5;"></i>
            <p>No recent reports</p>
          </div>
        `;
      }
      
      return reports.slice(0, 5).map((report, index) => {
        const icon = report.format === 'pdf' ? 'file-pdf' : 
                    report.format === 'excel' ? 'file-excel' : 'file-csv';
        
        return `
          <div class="report-item">
            <div class="report-item-icon">
              <i class="fas fa-${icon}"></i>
            </div>
            <div class="report-item-info">
              <div class="report-item-name">${report.fileName || 'Report'}</div>
              <div class="report-item-details">
                <span>${report.reportType || 'Report'}</span>
                <span>${report.format?.toUpperCase() || 'PDF'}</span>
                <span>${report.count || 0} activities</span>
              </div>
            </div>
            <div class="report-item-actions">
              <button class="action-btn" onclick="downloadRecentReport(${index})" title="Download">
                <i class="fas fa-download"></i>
              </button>
              <button class="action-btn" onclick="deleteRecentReport(${index})" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    async function loadMore() {
      const storageSize = (JSON.stringify(localStorage).length / 1024).toFixed(2);
      
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">settings</span>
              Settings
            </h3>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: var(--spacing-md);">
            <button class="btn btn-secondary" onclick="showProfile()">
              <span class="material-icons-round">person</span>
              Profile
            </button>
            
            <button class="btn btn-secondary" onclick="showNotificationsSettings()">
              <span class="material-icons-round">notifications</span>
              Notifications
            </button>
            
            <button class="btn btn-secondary" onclick="showPrivacySettings()">
              <span class="material-icons-round">security</span>
              Privacy & Security
            </button>
            
            <button class="btn btn-secondary" onclick="showHelp()">
              <span class="material-icons-round">help</span>
              Help & Support
            </button>
            
            <button class="btn btn-secondary" onclick="clearCache()">
              <span class="material-icons-round">delete</span>
              Clear Cache
            </button>
            
            <button class="btn btn-secondary" onclick="showAbout()">
              <span class="material-icons-round">info</span>
              About
            </button>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">App Information</h3>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Version</span>
              <span>1.0.0</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Last Sync</span>
              <span id="lastSyncTime">${new Date().toLocaleString()}</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Offline Activities</span>
              <span>${appState.offlineActivities.length}</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Storage Used</span>
              <span>${storageSize} KB</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">User</span>
              <span>${appState.currentUser?.name || 'Demo User'}</span>
            </div>
          </div>
        </div>
      `;
    }
    
    // Report Functions
    function selectReportType(type, element) {
      appState.reportType = type;
      
      document.querySelectorAll('.report-type-card').forEach(card => {
        card.classList.remove('selected');
      });
      element.classList.add('selected');
      
      const today = new Date();
      const startDate = new Date(today);
      
      if (type === 'weekly') {
        startDate.setDate(today.getDate() - 7);
      } else if (type === 'monthly') {
        startDate.setMonth(today.getMonth() - 1);
      }
      
      const startInput = document.getElementById('startDate');
      const endInput = document.getElementById('endDate');
      
      if (startInput && endInput) {
        startInput.valueAsDate = startDate;
        endInput.valueAsDate = today;
      }
    }
    
    function selectFormat(format, element) {
      appState.format = format;
      
      document.querySelectorAll('.format-option').forEach(option => {
        option.classList.remove('selected');
      });
      element.classList.add('selected');
    }
    
    function validateForm() {
      const startDate = document.getElementById('startDate')?.value;
      const endDate = document.getElementById('endDate')?.value;
      
      if (!startDate || !endDate) {
        showToast('Please select start and end dates', 'error');
        return false;
      }
      
      if (new Date(startDate) > new Date(endDate)) {
        showToast('Start date cannot be after end date', 'error');
        return false;
      }
      
      return true;
    }
    
    function previewReport() {
      if (!validateForm()) return;
      
      showLoading('Loading preview...');
      
      setTimeout(() => {
        const activities = [
          { date: '2026-03-01', activityType: 'FHTC Feeding', description: 'Feeding at Block A', fhtcCount: 15 },
          { date: '2026-03-02', activityType: 'Verification', description: 'Verified 20 households', fhtcCount: 0 },
          { date: '2026-03-03', activityType: 'Meeting', description: 'Team meeting', fhtcCount: 0 }
        ];
        
        showPreview(activities);
        hideLoading();
      }, 1000);
    }
    
    function showPreview(activities) {
      const previewContent = document.getElementById('previewContent');
      
      if (!activities || activities.length === 0) {
        previewContent.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--gray);">
            <i class="fas fa-clipboard-list" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
            <p>No activities found</p>
          </div>
        `;
      } else {
        let html = `
          <table class="preview-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Activity Type</th>
                <th>Description</th>
                <th>FHTC</th>
              </tr>
            </thead>
            <tbody>
        `;
        
        activities.forEach(activity => {
          html += `
            <tr>
              <td>${activity.date}</td>
              <td>${activity.activityType}</td>
              <td>${activity.description.substring(0, 30)}</td>
              <td>${activity.fhtcCount || 0}</td>
            </tr>
          `;
        });
        
        html += `
            </tbody>
          </table>
          <div style="margin-top: 12px; font-size: 12px; color: var(--gray);">
            Showing ${activities.length} activities
          </div>
        `;
        
        previewContent.innerHTML = html;
      }
      
      document.getElementById('reportPreview').style.display = 'block';
      document.getElementById('reportPreview').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    
    function closePreview() {
      document.getElementById('reportPreview').style.display = 'none';
    }
    
    function generateReport() {
      if (!validateForm()) return;
      
      showLoading('Generating report...');
      
      setTimeout(() => {
        const reportData = {
          fileName: `${appState.reportType}_report_${new Date().toISOString().split('T')[0]}.${appState.format}`,
          format: appState.format,
          reportType: appState.reportType,
          count: 15,
          timestamp: new Date().toISOString()
        };
        
        saveToRecentReports(reportData);
        
        showToast('Report generated successfully! Check your downloads folder.', 'success');
        hideLoading();
      }, 1500);
    }
    
    function initDownloadPage() {
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - 7);
      
      const startInput = document.getElementById('startDate');
      const endInput = document.getElementById('endDate');
      
      if (startInput && endInput) {
        startInput.valueAsDate = startDate;
        endInput.valueAsDate = today;
      }
    }
    
    // Recent Reports Functions
    function saveToRecentReports(reportData) {
      const recentReports = JSON.parse(localStorage.getItem('recentReports') || '[]');
      
      recentReports.unshift({
        ...reportData,
        timestamp: new Date().toISOString()
      });
      
      if (recentReports.length > 10) {
        recentReports.pop();
      }
      
      localStorage.setItem('recentReports', JSON.stringify(recentReports));
      appState.recentReports = recentReports;
      
      // Refresh the reports list if on download page
      if (appState.currentPage === 'download') {
        loadPage('download');
      }
    }
    
    function downloadRecentReport(index) {
      const report = appState.recentReports[index];
      showToast(`Downloading ${report.fileName}...`, 'info');
      
      // In a real app, this would trigger actual download
      setTimeout(() => {
        showToast(`Downloaded ${report.fileName}`, 'success');
      }, 1000);
    }
    
    function deleteRecentReport(index) {
      if (!confirm('Are you sure you want to delete this report?')) return;
      
      const recentReports = JSON.parse(localStorage.getItem('recentReports') || '[]');
      recentReports.splice(index, 1);
      
      localStorage.setItem('recentReports', JSON.stringify(recentReports));
      appState.recentReports = recentReports;
      
      if (appState.currentPage === 'download') {
        loadPage('download');
      }
      
      showToast('Report deleted', 'success');
    }
    
    // Activity Functions
    function viewActivity(activityId) {
      showToast(`Viewing activity ${activityId}`, 'info');
    }
    
    function viewTeamMember(memberId) {
      showToast(`Viewing team member ${memberId}`, 'info');
    }
    
    // Install Prompt
    function checkInstallPrompt() {
      if (appState.deferredPrompt && !isAppInstalled()) {
        const lastDismissed = localStorage.getItem('installPromptDismissed');
        const oneWeekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
        
        if (!lastDismissed || parseInt(lastDismissed) < oneWeekAgo) {
          document.getElementById('installPrompt').style.display = 'block';
        }
      }
    }
    
    function installApp() {
      if (appState.deferredPrompt) {
        appState.deferredPrompt.prompt();
        appState.deferredPrompt.userChoice.then(() => {
          appState.deferredPrompt = null;
          document.getElementById('installPrompt').style.display = 'none';
        });
      }
    }
    
    function dismissInstall() {
      document.getElementById('installPrompt').style.display = 'none';
      localStorage.setItem('installPromptDismissed', Date.now());
    }
    
    function isAppInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches ||
             window.navigator.standalone ||
             document.referrer.includes('android-app://');
    }
    
    // Offline Sync
    async function syncOfflineData() {
      if (appState.offlineActivities.length > 0) {
        showToast('Syncing offline data...', 'info');
        
        setTimeout(() => {
          localStorage.setItem('offlineActivities', JSON.stringify([]));
          appState.offlineActivities = [];
          showToast('Synced all offline activities', 'success');
          loadPage(appState.currentPage);
        }, 2000);
      }
    }
    
    // Loading functions
    function showLoading(text) {
      const loadingEl = document.getElementById('loading');
      const loadingText = document.getElementById('loadingText');
      
      if (loadingText) loadingText.textContent = text || 'Loading...';
      if (loadingEl) loadingEl.style.display = 'flex';
      appState.isLoading = true;
    }
    
    function hideLoading() {
      const loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
      appState.isLoading = false;
    }
    
    // Toast function
    function showToast(message, type = 'info') {
      const toastContainer = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideUp 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    
    // App Actions
    function refreshData() {
      showToast('Refreshing data...', 'info');
      loadPage(appState.currentPage);
    }
    
    function showNotifications() {
      showToast('No new notifications', 'info');
    }
    
    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        // Clear session but keep saved credentials if "Remember me" was checked
        sessionStorage.removeItem('trackmaster_session');
        
        // If you want to completely logout including saved credentials, uncomment:
        // localStorage.removeItem('trackmaster_user');
        // localStorage.removeItem('savedUsername');
        // localStorage.removeItem('savedPassword');
        
        window.location.href = 'login.html';
      }
    }
    
    // More page functions
    function showProfile() {
      showToast('Profile page coming soon', 'info');
    }
    
    function showNotificationsSettings() {
      showToast('Notifications settings coming soon', 'info');
    }
    
    function showPrivacySettings() {
      showToast('Privacy settings coming soon', 'info');
    }
    
    function showHelp() {
      window.open('mailto:support@trackmaster.com?subject=Help Request', '_blank');
    }
    
    function clearCache() {
      if (confirm('Clear all cached data? This will not affect your saved login.')) {
        const savedUser = localStorage.getItem('trackmaster_user');
        const savedUsername = localStorage.getItem('savedUsername');
        const savedPassword = localStorage.getItem('savedPassword');
        
        localStorage.clear();
        
        // Restore login data
        if (savedUser) localStorage.setItem('trackmaster_user', savedUser);
        if (savedUsername) localStorage.setItem('savedUsername', savedUsername);
        if (savedPassword) localStorage.setItem('savedPassword', savedPassword);
        
        appState.offlineActivities = [];
        appState.recentReports = [];
        
        showToast('Cache cleared successfully', 'success');
        loadPage('more');
      }
    }
    
    function showAbout() {
      showToast('TrackMaster v1.0.0 - Timesheet Management System', 'info');
    }
    
    // API call helper (mock for GitHub Pages)
    async function callAPI(action, data = {}) {
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve({ success: true, message: 'Mock API response' });
        }, 500);
      });
    }
    
    // Initialize app on load
    window.onload = initApp;
  </script>
</body>
</html>
