        </a>
        <a href="#" class="nav-item" onclick="navigateTo('download')">

          <span class="nav-label">Reports</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('more')">
          <span class="material-icons-round nav-icon">more_horiz</span>
          <span class="nav-label">More</span>
        </a>
      </div>
    </div>
    
    <!-- Install Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
      <div class="install-header">
        <div class="install-icon">
          <span class="material-icons-round">install_mobile</span>
        </div>
        <div>
          <div class="install-title">Install TrackMaster</div>
          <div class="install-subtitle">Add to home screen for better experience</div>
        </div>
      </div>
      <div class="install-actions">
        <button class="btn btn-primary" style="flex: 1;" onclick="installApp()">Install</button>
        <button class="btn btn-secondary" style="flex: 1;" onclick="dismissInstall()">Not Now</button>
      </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>
  
  <script>
    // App State
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      deferredPrompt: null,
      currentPage: 'home',
      isLoading: false,
      offlineActivities: JSON.parse(localStorage.getItem('offlineActivities') || '[]'),
      recentReports: JSON.parse(localStorage.getItem('recentReports') || '[]'),
      reportType: 'weekly',
      format: 'pdf',
      previewData: null
    };
    
    // Check authentication
    function checkAuth() {
      const savedUser = localStorage.getItem('trackmaster_user');
      const sessionUser = sessionStorage.getItem('trackmaster_session');
      
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          const expiryTime = userData.expiry || 0;
          
          if (Date.now() < expiryTime) {
            appState.currentUser = userData;
            return true;
          } else {
            localStorage.removeItem('trackmaster_user');
          }
        } catch (e) {
          console.error('Error parsing saved user:', e);
        }
      } else if (sessionUser) {
        try {
          appState.currentUser = JSON.parse(sessionUser);
          return true;
        } catch (e) {
          console.error('Error parsing session user:', e);
        }
      }
      
      // No valid session, redirect to login
      window.location.href = 'login.html';
      return false;
    }
    
    // Initialize App
    async function initApp() {
      // Check authentication first
      if (!checkAuth()) return;
      
      // Register Service Worker
      registerServiceWorker();
      
      // Setup event listeners
      setupEventListeners();
      
      // Load initial page
      loadPage('home');
      
      // Show install prompt if applicable
      setTimeout(checkInstallPrompt, 3000);
    }
