    .action-btn {

    /* Loading States */
    .loading {

    .skeleton {

      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Loading Overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--white);

      height: 48px;

      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;

    @keyframes spin {

    .toast.success {

    .toast.error {

    .toast.warning {

    .toast.info {

      to {

    .install-actions {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }
    
    /* Offline Indicator */
    .offline-indicator {
      position: fixed;
      top: calc(64px + var(--safe-top));
      left: 0;
      right: 0;
      background: var(--warning);
      color: white;
      text-align: center;
      padding: var(--spacing-sm);
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      animation: slideDown 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
    }
    
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }
    
    /* Team Member Card */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--spacing-md);
    }
    
    .team-member {
      background: white;
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-1);
    }
    
    .member-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    
    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--primary-container);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
    }
    
    .member-info h4 {
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .member-role {
      font-size: 12px;
      color: var(--outline);
    }
    
    .member-id {
      font-weight: 600;
      color: var(--primary);
    }
    
    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #1D1B20;
        --surface-container: #2D2B30;
        --on-surface: #E6E1E5;
        --light: #2D2B30;
        --white: #2D2B30;
        --gray-light: #404040;
        --gray: #A0A0A0;
        --dark: #E6E1E5;
      }
      
      .card, .activity-item, .team-member, .report-preview, .recent-reports {
        background: var(--surface-container);
      }
      
      .stat-card {
        background: rgba(255, 255, 255, 0.05);
      }
      
      .bottom-nav {
        background: rgba(45, 45, 45, 0.95);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .install-prompt {
        background: var(--surface-container);
        border-color: rgba(255, 255, 255, 0.1);
      }
      
      .form-input {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--on-surface);
      }
      
      .report-item {
        background: rgba(255, 255, 255, 0.05);
      }
      
      .preview-content {
        background: rgba(0, 0, 0, 0.2);
      }
    }
    
    /* Tablet and Desktop */
    @media (min-width: 768px) {
      body {
        max-width: 480px;
        margin: 0 auto;
        box-shadow: 0 0 40px rgba(0,0,0,0.1);
      }
      
      .bottom-nav {
        max-width: 480px;
        left: 50%;
        transform: translateX(-50%);
      }
      
      .fab {
        right: calc(50% - 240px + var(--spacing-lg));
      }
      
      .install-prompt {
        max-width: 480px;
        left: 50%;
        transform: translateX(-50%);
      }
    }
    
    /* Landscape */
    @media (orientation: landscape) and (max-height: 600px) {
      .app-bar {
        padding-top: var(--spacing-md);
      }
      
      .bottom-nav {
        padding-bottom: var(--spacing-sm);
      }
      
      .fab {
        bottom: 70px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <!-- App Bar -->
      <div class="app-bar">
        <div class="app-bar-content">
          <div class="app-title">TrackMaster</div>
        </div>
        <div class="app-actions">
          <button class="icon-button" onclick="refreshData()" title="Refresh">
            <span class="material-icons-round">refresh</span>
          </button>
          <button class="icon-button" onclick="showNotifications()" title="Notifications">
            <span class="material-icons-round">notifications</span>
          </button>
          <button class="icon-button" onclick="logout()" title="Logout">
            <span class="material-icons-round">logout</span>
          </button>
        </div>
      </div>
      
      <!-- Offline Indicator -->
      <div id="offlineIndicator" class="offline-indicator" style="display: none;">
        <span class="material-icons-round">cloud_off</span>
        You're offline - Changes will sync when online
      </div>
      
      <!-- Main Content -->
      <div class="main-content">
        <div class="page-container">
          <div class="page" id="currentPage">
            <!-- Page content loaded dynamically -->
          </div>
        </div>
      </div>
      
      <!-- Floating Action Button -->
      <button class="fab" onclick="navigateTo('newactivity')" title="New Activity">
        <span class="material-icons-round">add</span>
      </button>
      
      <!-- Bottom Navigation -->
      <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="navigateTo('home')">
          <span class="material-icons-round nav-icon">home</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('myactivity')">
          <span class="material-icons-round nav-icon">list_alt</span>
          <span class="nav-label">Activity</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('myteam')">
          <span class="material-icons-round nav-icon">groups</span>
          <span class="nav-label">Team</span>
        </a>
        <a href="#" class="nav-item active" onclick="navigateTo('download')">
          <span class="material-icons-round nav-icon">download</span>
          <span class="nav-label">Reports</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('more')">
          <span class="material-icons-round nav-icon">more_horiz</span>
          <span class="nav-label">More</span>
        </a>
      </div>
    </div>
    
    <!-- Install Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
      <div class="install-header">
        <div class="install-icon">
          <span class="material-icons-round">install_mobile</span>
        </div>
        <div>
          <div class="install-title">Install TrackMaster</div>
          <div class="install-subtitle">Add to home screen for better experience</div>
        </div>
      </div>
      <div class="install-actions">
        <button class="btn btn-primary" style="flex: 1;" onclick="installApp()">Install</button>
        <button class="btn btn-secondary" style="flex: 1;" onclick="dismissInstall()">Not Now</button>
      </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Generating report...</div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>
  
  <script>
    // App State
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      deferredPrompt: null,
      currentPage: 'download',
      isLoading: false,
      offlineActivities: JSON.parse(localStorage.getItem('offlineActivities') || '[]'),
      recentReports: JSON.parse(localStorage.getItem('recentReports') || '[]'),
      reportType: 'weekly',
      format: 'pdf',
      previewData: null
    };
    
    // Service Worker Registration
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('<?= appUrl ?>?path=service-worker', {
          scope: '<?= appUrl ?>'
        })
        .then(registration => {
          console.log('Service Worker registered:', registration);
          
          // Check for updates
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            console.log('New Service Worker found:', newWorker);
            
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showToast('App update available! Refresh to update.', 'info');
              }
            });
          });
        })
        .catch(error => {
          console.error('Service Worker registration failed:', error);
        });
      }
    }
    
    // Initialize App
    async function initApp() {
      // Check authentication
      const user = await google.script.run
        .withFailureHandler(handleError)
        .getCurrentUser();
      
      if (!user) {
        window.location.href = '<?= appUrl ?>?path=login';
        return;
      }
      
      appState.currentUser = user;
      
      // Register Service Worker
      registerServiceWorker();
      
      // Setup event listeners
      setupEventListeners();
      
      // Load initial page (download by default since it's active)
      loadPage('download');
      
      // Show install prompt if applicable
      setTimeout(checkInstallPrompt, 3000);
    }
    
    // Setup Event Listeners
    function setupEventListeners() {
      // Network status
      window.addEventListener('online', () => {
        appState.isOnline = true;
        document.getElementById('offlineIndicator').style.display = 'none';
        syncOfflineData();
      });
      
      window.addEventListener('offline', () => {
        appState.isOnline = false;
        document.getElementById('offlineIndicator').style.display = 'flex';
      });
      
      // Install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        appState.deferredPrompt = e;
      });
      
      window.addEventListener('appinstalled', () => {
        appState.deferredPrompt = null;
        showToast('App installed successfully!', 'success');
      });
      
      // Back button handling
      window.addEventListener('popstate', (e) => {
        if (e.state && e.state.page) {
          loadPage(e.state.page, false);
        }
      });
      
      // Prevent pull-to-refresh on mobile
      let touchStartY = 0;
      document.addEventListener('touchstart', e => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      
      document.addEventListener('touchmove', e => {
        const touchY = e.touches[0].clientY;
        const touchDiff = touchStartY - touchY;
        
        if (touchDiff < -100 && window.scrollY === 0) {
          e.preventDefault();
        }
      }, { passive: false });
    }
    
    // Navigation
    function navigateTo(page, pushState = true) {
      event.preventDefault();
      loadPage(page);
      
      if (pushState) {
        window.history.pushState({ page }, '', `?path=${page}`);
      }
      
      // Update active nav item
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      event.currentTarget.classList.add('active');
      
      appState.currentPage = page;
    }
    
    async function loadPage(page) {
      if (appState.isLoading) return;
      
      appState.currentPage = page;
      appState.isLoading = true;
      
      const pageContainer = document.getElementById('currentPage');
      
      // Show loading skeleton
      pageContainer.innerHTML = `
        <div class="card">
          <div class="skeleton" style="height: 24px; width: 60%; margin-bottom: 16px;"></div>
          <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 80px;"></div>
        </div>
      `;
      
      try {
        let html = '';
        
        switch(page) {
          case 'home':
            html = await loadDashboard();
            break;
          case 'myactivity':
            html = await loadMyActivity();
            break;
          case 'myteam':
            html = await loadMyTeam();
            break;
          case 'download':
            html = await loadDownload();
            break;
          case 'more':
            html = await loadMore();
            break;
          case 'newactivity':
            window.location.href = '<?= appUrl ?>?path=newactivity';
            return;
        }
        
        pageContainer.innerHTML = html;
        
        // Initialize page-specific functionality
        switch(page) {
          case 'myactivity':
            initActivityPage();
            break;
          case 'download':
            initDownloadPage();
            break;
        }
        
      } catch (error) {
        console.error('Error loading page:', error);
        pageContainer.innerHTML = `
          <div class="card">
            <div style="text-align: center; padding: 40px;">
              <span class="material-icons-round" style="font-size: 48px; color: var(--error);">
                error
              </span>
              <p style="margin-top: 16px; color: var(--outline);">
                Failed to load page. Please try again.
              </p>
              <button class="btn btn-primary" onclick="loadPage('${page}')" style="margin-top: 16px;">
                Retry
              </button>
            </div>
          </div>
        `;
      } finally {
        appState.isLoading = false;
      }
    }
    
    // Page Loaders
    async function loadDashboard() {
      const data = await google.script.run
        .withFailureHandler(handleError)
        .getDashboardData();
      
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">dashboard</span>
              Quick Stats
            </h3>
            <span class="material-icons-round" style="color: var(--outline);">more_vert</span>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value">${data.thisWeek || 0}</div>
              <div class="stat-label">This Week</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.thisMonth || 0}</div>
              <div class="stat-label">This Month</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.total || 0}</div>
              <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.pending || 0}</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">today</span>
              Today's Activities
            </h3>
          </div>
          <div class="activity-list">
            ${data.todayActivities && data.todayActivities.length > 0 ? 
              data.todayActivities.map(activity => `
                <div class="activity-item">
                  <div class="activity-header">
                    <span class="activity-date">${activity.time}</span>
                    <span class="activity-day">${activity.type}</span>
                  </div>
                  <div class="activity-description">${activity.description}</div>
                </div>
              `).join('') :
              '<div style="text-align: center; padding: 20px; color: var(--outline);">No activities for today</div>'
            }
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">history</span>
              Recent Activities
            </h3>
          </div>
          <div class="activity-list">
            ${data.recentActivities && data.recentActivities.length > 0 ? 
              data.recentActivities.map(activity => `
                <div class="activity-item">
                  <div class="activity-header">
                    <span class="activity-date">${activity.date}</span>
                    <span class="activity-day">${activity.day}</span>
                  </div>
                  <div class="activity-description">${activity.description}</div>
                </div>
              `).join('') :
              '<div style="text-align: center; padding: 20px; color: var(--outline);">No recent activities</div>'
            }
          </div>
        </div>
      `;
    }
    
    async function loadMyActivity() {
      const data = await google.script.run
        .withFailureHandler(handleError)
        .getActivities();
      
      // Group by month
      const groupedByMonth = {};
      data.activities.forEach(activity => {
        const date = new Date(activity.date);
        const monthKey = date.toLocaleString('default', { month: 'short' }) + '-' + date.getFullYear();
        
        if (!groupedByMonth[monthKey]) {
          groupedByMonth[monthKey] = [];
        }
        groupedByMonth[monthKey].push(activity);
      });
      
      let html = `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">calendar_today</span>
              Monthly Summary
            </h3>
          </div>
          <div class="stats-grid">
            ${Object.entries(data.monthlyCounts || {}).slice(0, 4).map(([month, count]) => `
              <div class="stat-card">
                <div class="stat-value">${count}</div>
                <div class="stat-label">${month}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      
      // Add activities by month
      for (const [month, activities] of Object.entries(groupedByMonth)) {
        html += `
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">${month}</h3>
              <span class="activity-day">${activities.length} activities</span>
            </div>
            <div class="activity-list">
              ${activities.map(activity => `
                <div class="activity-item ${activity.description.includes('Holiday') ? 'holiday' : ''}">
                  <div class="activity-header">
                    <span class="activity-date">${activity.date}</span>
                    <span class="activity-day">${activity.day}</span>
                  </div>
                  <div class="activity-description">${activity.description}</div>
                  <div class="activity-meta">
                    <span class="activity-meta-item">
                      <span class="material-icons-round" style="font-size: 16px;">location_on</span>
                      ${activity.blockName || 'Not specified'}
                    </span>
                    <span class="activity-meta-item">
                      <span class="material-icons-round" style="font-size: 16px;">category</span>
                      ${activity.activityType}
                    </span>
                  </div>
                  ${activity.images && activity.images.length > 0 ? `
                    <div class="images-grid">
                      ${activity.images.slice(0, 3).map(image => `
                        <div class="image-item">
                          <img src="${image}" alt="Activity image" loading="lazy">
                        </div>
                      `).join('')}
                      ${activity.images.length > 3 ? `
                        <div class="image-item" style="background: var(--surface-container); display: flex; align-items: center; justify-content: center;">
                          <span style="color: var(--outline); font-weight: 600;">+${activity.images.length - 3}</span>
                        </div>
                      ` : ''}
                    </div>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      return html;
    }
    
    async function loadMyTeam() {
      const data = await google.script.run
        .withFailureHandler(handleError)
        .getTeam();
      
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">groups</span>
              My Team
            </h3>
          </div>
          <div class="team-grid">
            ${data.team.map(member => `
              <div class="team-member">
                <div class="member-header">
                  <div class="member-avatar">
                    ${member.name.split(' ').map(n => n[0]).join('').toUpperCase()}
                  </div>
                  <div class="member-info">
                    <h4>${member.name}</h4>
                    <div class="member-role">${member.role}</div>
                  </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div class="member-id">${member.employeeId}</div>
                  ${member.contact ? `
                    <a href="mailto:${member.contact}" class="icon-button" style="width: 36px; height: 36px;">
                      <span class="material-icons-round">email</span>
                    </a>
                  ` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    
    async function loadDownload() {
      return `
        <!-- Report Types -->
        <div class="report-types">
          <div class="report-type-card selected" onclick="selectReportType('weekly', this)">
            <div class="report-icon">
              <i class="fas fa-calendar-week"></i>
            </div>
            <div class="report-title">Weekly Timesheet</div>
            <div class="report-desc">Last 7 days summary</div>
          </div>
          
          <div class="report-type-card" onclick="selectReportType('monthly', this)">
            <div class="report-icon">
              <i class="fas fa-calendar-alt"></i>
            </div>
            <div class="report-title">Monthly Report</div>
            <div class="report-desc">Complete month summary</div>
          </div>
        </div>
        
        <!-- Report Form -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">settings</span>
              Report Configuration
            </h3>
          </div>
          
          <div class="form-group">
            <label class="form-label required">Date Range</label>
            <div class="date-range">
              <div>
                <label style="font-size: 12px; color: var(--gray);">Start Date</label>
                <input type="date" class="form-input" id="startDate" required>
              </div>
              <div>
                <label style="font-size: 12px; color: var(--gray);">End Date</label>
                <input type="date" class="form-input" id="endDate" required>
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label required">Format</label>
            <div class="format-options">
              <div class="format-option selected" onclick="selectFormat('pdf', this)">
                <div class="format-icon">
                  <i class="fas fa-file-pdf"></i>
                </div>
                <div class="format-name">PDF</div>
              </div>
              
              <div class="format-option" onclick="selectFormat('excel', this)">
                <div class="format-icon">
                  <i class="fas fa-file-excel"></i>
                </div>
                <div class="format-name">Excel</div>
              </div>
              
              <div class="format-option" onclick="selectFormat('csv', this)">
                <div class="format-icon">
                  <i class="fas fa-file-csv"></i>
                </div>
                <div class="format-name">CSV</div>
              </div>
            </div>
          </div>
          
          <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
            <button class="btn btn-secondary btn-full" onclick="previewReport()">
              <span class="material-icons-round">visibility</span>
              Preview
            </button>
            <button class="btn btn-primary btn-full" onclick="generateReport()">
              <span class="material-icons-round">download</span>
              Download
            </button>
          </div>
        </div>
        
        <!-- Report Preview -->
        <div class="report-preview" id="reportPreview" style="display: none;">
          <div class="preview-header">
            <h3>Report Preview</h3>
            <button class="action-btn" onclick="closePreview()">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="preview-content" id="previewContent">
            <!-- Preview will be loaded here -->
          </div>
        </div>
        
        <!-- Recent Reports -->
        <div class="recent-reports">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">history</span>
              Recent Reports
            </h3>
          </div>
          
          <div class="reports-list" id="recentReports">
            <!-- Recent reports will be loaded here -->
          </div>
        </div>
      `;
    }
    
    async function loadMore() {
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">settings</span>
              Settings
            </h3>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: var(--spacing-md);">
            <button class="btn btn-secondary" onclick="showProfile()">
              <span class="material-icons-round">person</span>
              Profile
            </button>
            
            <button class="btn btn-secondary" onclick="showNotificationsSettings()">
              <span class="material-icons-round">notifications</span>
              Notifications
            </button>
            
            <button class="btn btn-secondary" onclick="showPrivacySettings()">
              <span class="material-icons-round">security</span>
              Privacy & Security
            </button>
            
            <button class="btn btn-secondary" onclick="showHelp()">
              <span class="material-icons-round">help</span>
              Help & Support
            </button>
            
            <button class="btn btn-secondary" onclick="clearCache()">
              <span class="material-icons-round">delete</span>
              Clear Cache
            </button>
            
            <button class="btn btn-secondary" onclick="showAbout()">
              <span class="material-icons-round">info</span>
              About
            </button>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">App Information</h3>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Version</span>
              <span>1.0.0</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Last Sync</span>
              <span id="lastSyncTime">${new Date().toLocaleString()}</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Offline Activities</span>
              <span>${appState.offlineActivities.length}</span>
            </div>
            
            <div style="display: flex; justify-content: space-between;">
              <span style="color: var(--outline);">Storage Used</span>
              <span>${(JSON.stringify(localStorage).length / 1024).toFixed(2)} KB</span>
            </div>
          </div>
        </div>
      `;
    }
    
    // Install Prompt
    function checkInstallPrompt() {
      if (appState.deferredPrompt && !isAppInstalled()) {
        const lastDismissed = localStorage.getItem('installPromptDismissed');
        const oneWeekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
        
        if (!lastDismissed || parseInt(lastDismissed) < oneWeekAgo) {
          document.getElementById('installPrompt').style.display = 'block';
        }
      }
    }
    
    function installApp() {
      if (appState.deferredPrompt) {
        appState.deferredPrompt.prompt();
        
        appState.deferredPrompt.userChoice.then(choiceResult => {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted install');
          }
          appState.deferredPrompt = null;
          document.getElementById('installPrompt').style.display = 'none';
        });
      }
    }
    
    function dismissInstall() {
      document.getElementById('installPrompt').style.display = 'none';
      localStorage.setItem('installPromptDismissed', Date.now());
    }
    
    function isAppInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches ||
             window.navigator.standalone ||
             document.referrer.includes('android-app://');
    }
    
    // Offline Sync
    async function syncOfflineData() {
      if (appState.offlineActivities.length > 0) {
        showToast('Syncing offline data...', 'info');
        
        try {
          const result = await google.script.run
            .withFailureHandler(handleError)
            .syncOfflineActivities(appState.offlineActivities);
          
          if (result.success) {
            localStorage.setItem('offlineActivities', JSON.stringify([]));
            appState.offlineActivities = [];
            showToast(`Synced ${result.synced} activities`, 'success');
            
            // Refresh current page
            loadPage(appState.currentPage);
          }
        } catch (error) {
          showToast('Sync failed: ' + error, 'error');
        }
      }
    }
    
    // Save activity offline
    function saveActivityOffline(activityData) {
      const activity = {
        id: 'offline-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
        timestamp: new Date().toISOString(),
        ...activityData
      };
      
      appState.offlineActivities.push(activity);
      localStorage.setItem('offlineActivities', JSON.stringify(appState.offlineActivities));
      
      return activity;
    }
    
    // Report Functions
    function selectReportType(type, element) {
      appState.reportType = type;
      
      // Update UI
      document.querySelectorAll('.report-type-card').forEach(card => {
        card.classList.remove('selected');
      });
      element.classList.add('selected');
      
      // Adjust date range based on type
      const today = new Date();
      const startDate = new Date(today);
      
      if (type === 'weekly') {
        startDate.setDate(today.getDate() - 7);
      } else if (type === 'monthly') {
        startDate.setMonth(today.getMonth() - 1);
      }
      
      document.getElementById('startDate').valueAsDate = startDate;
      document.getElementById('endDate').valueAsDate = today;
    }
    
    function selectFormat(format, element) {
      appState.format = format;
      
      // Update UI
      document.querySelectorAll('.format-option').forEach(option => {
        option.classList.remove('selected');
      });
      element.classList.add('selected');
    }
    
    function validateForm() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      
      if (!startDate || !endDate) {
        showToast('Please select start and end dates', 'error');
        return false;
      }
      
      if (new Date(startDate) > new Date(endDate)) {
        showToast('Start date cannot be after end date', 'error');
        return false;
      }
      
      return true;
    }
    
    async function previewReport() {
      if (!validateForm()) return;
      
      try {
        showLoading('Loading preview...');
        
        const params = getReportParams();
        const response = await callAPI('getActivities', params);
        
        if (response.success) {
          appState.previewData = response.activities;
          showPreview(response.activities);
        } else {
          throw new Error(response.message);
        }
      } catch (error) {
        console.error('Preview error:', error);
        showToast('Failed to load preview', 'error');
      } finally {
        hideLoading();
      }
    }
    
    function showPreview(activities) {
      const previewContent = document.getElementById('previewContent');
      
      if (!activities || activities.length === 0) {
        previewContent.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--gray);">
            <i class="fas fa-clipboard-list" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
            <p>No activities found for the selected date range</p>
          </div>
        `;
      } else {
        let html = `
          <table class="preview-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Activity Type</th>
                <th>Description</th>
                <th>FHTC</th>
              </tr>
            </thead>
            <tbody>
        `;
        
        activities.slice(0, 10).forEach(activity => {
          html += `
            <tr>
              <td>${activity.date}</td>
              <td>${activity.activityType}</td>
              <td>${activity.description.substring(0, 30)}${activity.description.length > 30 ? '...' : ''}</td>
              <td>${activity.fhtcCount || 0}</td>
            </tr>
          `;
        });
        
        if (activities.length > 10) {
          html += `
            <tr>
              <td colspan="4" style="text-align: center; font-style: italic;">
                ... and ${activities.length - 10} more activities
              </td>
            </tr>
          `;
        }
        
        html += `
            </tbody>
          </table>
          <div style="margin-top: 12px; font-size: 12px; color: var(--gray);">
            Showing ${Math.min(activities.length, 10)} of ${activities.length} activities
          </div>
        `;
        
        previewContent.innerHTML = html;
      }
      
      document.getElementById('reportPreview').style.display = 'block';
      
      // Scroll to preview
      document.getElementById('reportPreview').scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });
    }
    
    function closePreview() {
      document.getElementById('reportPreview').style.display = 'none';
    }
    
    async function generateReport() {
      if (!validateForm()) return;
      
      try {
        showLoading('Generating report...');
        
        const params = getReportParams();
        params.format = appState.format;
        
        const response = await callAPI('downloadReport', params);
        
        if (response.success) {
          // Save to recent reports
          saveToRecentReports(response);
          
          // Download the file
          if (response.pdfUrl) {
            window.open(response.pdfUrl, '_blank');
          } else if (response.fileUrl) {
            window.open(response.fileUrl, '_blank');
          }
          
          showToast('Report generated successfully', 'success');
        } else {
          throw new Error(response.message);
        }
      } catch (error) {
        console.error('Generate error:', error);
        showToast('Failed to generate report', 'error');
      } finally {
        hideLoading();
      }
    }
    
    function getReportParams() {
      return {
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        reportType: appState.reportType,
        format: appState.format
      };
    }
    
    function initDownloadPage() {
      // Set default dates (current week)
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - 7); // One week ago
      
      const startDateInput = document.getElementById('startDate');
      const endDateInput = document.getElementById('endDate');
      
      if (startDateInput && endDateInput) {
        startDateInput.valueAsDate = startDate;
        endDateInput.valueAsDate = today;
      }
      
      // Load recent reports
      loadRecentReports();
    }
    
    // Recent Reports Functions
    function loadRecentReports() {
      const recentReports = JSON.parse(localStorage.getItem('recentReports') || '[]');
      appState.recentReports = recentReports;
      renderRecentReports();
    }
    
    function renderRecentReports() {
      const container = document.getElementById('recentReports');
      
      if (!container) return;
      
      if (appState.recentReports.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 20px; color: var(--gray);">
            <i class="fas fa-file" style="font-size: 24px; margin-bottom: 8px; opacity: 0.5;"></i>
            <p>No recent reports</p>
          </div>
        `;
        return;
      }
      
      let html = '';
      
      appState.recentReports.slice(0, 5).forEach((report, index) => {
        const icon = report.format === 'pdf' ? 'file-pdf' : 
                    report.format === 'excel' ? 'file-excel' : 'file-csv';
        
        html += `
          <div class="report-item">
            <div class="report-item-icon">
              <i class="fas fa-${icon}"></i>
            </div>
            <div class="report-item-info">
              <div class="report-item-name">${report.fileName || 'Report'}</div>
              <div class="report-item-details">
                <span>${report.reportType || 'Report'}</span>
                <span>${report.format?.toUpperCase() || 'PDF'}</span>
                <span>${report.count || 0} activities</span>
              </div>
            </div>
            <div class="report-item-actions">
              <button class="action-btn" onclick="downloadRecentReport(${index})" title="Download">
                <i class="fas fa-download"></i>
              </button>
              <button class="action-btn" onclick="deleteRecentReport(${index})" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    function saveToRecentReports(reportData) {
      const recentReports = JSON.parse(localStorage.getItem('recentReports') || '[]');
      
      // Add new report at the beginning
      recentReports.unshift({
        ...reportData,
        timestamp: new Date().toISOString()
      });
      
      // Keep only last 10 reports
      if (recentReports.length > 10) {
        recentReports.pop();
      }
      
      localStorage.setItem('recentReports', JSON.stringify(recentReports));
      loadRecentReports();
    }
    
    function downloadRecentReport(index) {
      const report = appState.recentReports[index];
      
      if (report.pdfUrl || report.fileUrl) {
        window.open(report.pdfUrl || report.fileUrl, '_blank');
      } else {
        showToast('Download link not available', 'error');
      }
    }
    
    function deleteRecentReport(index) {
      if (!confirm('Are you sure you want to delete this report?')) {
        return;
      }
      
      const recentReports = JSON.parse(localStorage.getItem('recentReports') || '[]');
      recentReports.splice(index, 1);
      
      localStorage.setItem('recentReports', JSON.stringify(recentReports));
      loadRecentReports();
      showToast('Report deleted', 'success');
    }
    
    // Loading functions
    function showLoading(text) {
      const loadingEl = document.getElementById('loading');
      const loadingText = document.getElementById('loadingText');
      
      if (loadingText) loadingText.textContent = text || 'Generating report...';
      if (loadingEl) {
        loadingEl.style.display = 'flex';
      }
      appState.isLoading = true;
    }
    
    function hideLoading() {
      const loadingEl = document.getElementById('loading');
      if (loadingEl) {
        loadingEl.style.display = 'none';
      }
      appState.isLoading = false;
    }
    
    // Utility Functions
    function showToast(message, type = 'info') {
      const toastContainer = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideUp 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    
    function handleError(error) {
      console.error('Error:', error);
      showToast('Error: ' + error, 'error');
      
      if (!appState.isOnline) {
        showToast('You are offline. Some features may be unavailable.', 'warning');
      }
      
      return null;
    }
    
    function refreshData() {
      showToast('Refreshing...', 'info');
      loadPage(appState.currentPage);
    }
    
    async function logout() {
      try {
        await google.script.run
          .withFailureHandler(handleError)
          .handleLogout();
        
        localStorage.clear();
        window.location.href = '<?= appUrl ?>?path=login';
      } catch (error) {
        handleError(error);
      }
    }
    
    // Page-specific initializers
    function initActivityPage() {
      // Add swipe functionality
      const activityItems = document.querySelectorAll('.activity-item');
      
      activityItems.forEach(item => {
        let touchStartX = 0;
        let touchEndX = 0;
        let isSwiping = false;
        
        item.addEventListener('touchstart', e => {
          touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        item.addEventListener('touchmove', e => {
          touchEndX = e.touches[0].clientX;
          const diff = touchStartX - touchEndX;
          
          if (Math.abs(diff) > 50) {
            isSwiping = true;
            item.style.transform = `translateX(${-diff}px)`;
          }
        }, { passive: true });
        
        item.addEventListener('touchend', () => {
          if (isSwiping) {
            const diff = touchStartX - touchEndX;
            
            if (diff > 100) {
              // Swipe left - show delete option
              showSwipeActions(item, 'delete');
            } else if (diff < -100) {
              // Swipe right - show edit option
              showSwipeActions(item, 'edit');
            }
            
            item.style.transform = 'translateX(0)';
            isSwiping = false;
          }
        });
      });
    }
    
    function showSwipeActions(item, action) {
      // Implementation for swipe actions
      console.log(`${action} action for item:`, item);
    }
    
    // More page functions
    function showProfile() {
      showToast('Profile page coming soon', 'info');
    }
    
    function showNotificationsSettings() {
      showToast('Notifications settings coming soon', 'info');
    }
    
    function showPrivacySettings() {
      showToast('Privacy settings coming soon', 'info');
    }
    
    function showHelp() {
      window.open('mailto:support@trackmaster.com?subject=Help Request', '_blank');
    }
    
    function clearCache() {
      localStorage.clear();
      appState.offlineActivities = [];
      appState.recentReports = [];
      showToast('Cache cleared successfully', 'success');
      loadPage('more');
    }
    
    function showAbout() {
      showToast('TrackMaster v1.0.0 - Timesheet Management System', 'info');
    }
    
    function showNotifications() {
      showToast('No new notifications', 'info');
    }
    
    // API call helper
    async function callAPI(action, data = {}) {
      const appUrl = '<?= appUrl ?>';
      
      try {
        const response = await fetch(appUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: new URLSearchParams({
            action: action,
            ...data
          })
        });
        
        return await response.json();
      } catch (error) {
        console.error('API call error:', error);
        throw error;
      }
    }
    
    // Initialize app on load
    google.script.run
      .withSuccessHandler(initApp)
      .withFailureHandler(error => {
        console.error('Initialization failed:', error);
        window.location.href = '<?= appUrl ?>?path=login';
      })
      .getCurrentUser();
  </script>
</body>
</html>
