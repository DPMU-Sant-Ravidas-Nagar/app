<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6750A4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrackMaster">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="api.js"></script>
  
  <style>
    /* Dashboard specific styles */
    .team-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-md);
    }
    
    .team-member {
      background: var(--surface-container);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .team-member:active {
      transform: scale(0.98);
    }
    
    .member-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    
    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
    }
    
    .member-info h4 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .member-role {
      font-size: 12px;
      color: var(--outline);
    }
    
    .member-id {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .member-contact {
      font-size: 12px;
      color: var(--outline);
    }
    
    .activity-item {
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .activity-item:hover {
      transform: translateX(4px);
    }
    
    .activity-item.pending {
      border-left-color: var(--warning);
    }
    
    .activity-meta {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-sm);
      font-size: 12px;
      color: var(--outline);
    }
    
    .activity-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .report-preview {
      margin-top: var(--spacing-lg);
      max-height: 400px;
      overflow-y: auto;
    }
    
    .preview-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .preview-table th {
      background: var(--primary);
      color: white;
      padding: var(--spacing-sm);
      font-size: 12px;
      text-align: left;
      position: sticky;
      top: 0;
    }
    
    .preview-table td {
      padding: var(--spacing-sm);
      border-bottom: 1px solid var(--outline);
      font-size: 12px;
    }
    
    .filter-bar {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      overflow-x: auto;
      padding: var(--spacing-xs) 0;
    }
    
    .filter-chip {
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-full);
      background: var(--surface-container);
      color: var(--on-surface);
      border: none;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
    }
    
    .filter-chip.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <!-- App Bar -->
      <div class="app-bar">
        <div class="app-bar-content">
          <div class="app-title">TrackMaster</div>
        </div>
        <div class="app-actions">
          <button class="icon-button" onclick="refreshData()" title="Refresh">
            <span class="material-icons-round">refresh</span>
          </button>
          <button class="icon-button" onclick="showNotifications()" title="Notifications">
            <span class="material-icons-round">notifications</span>
          </button>
          <button class="icon-button" onclick="logout()" title="Logout">
            <span class="material-icons-round">logout</span>
          </button>
        </div>
      </div>
      
      <!-- Offline Indicator -->
      <div id="offlineIndicator" class="offline-indicator" style="display: none;">
        <span class="material-icons-round">cloud_off</span>
        You're offline - Changes will sync when online
      </div>
      
      <!-- Main Content -->
      <div class="main-content">
        <div class="page-container">
          <div class="page" id="currentPage">
            <!-- Page content loaded dynamically -->
          </div>
        </div>
      </div>
      
      <!-- Floating Action Button -->
      <button class="fab" onclick="navigateTo('newactivity')" title="New Activity">
        <span class="material-icons-round">add</span>
      </button>
      
      <!-- Bottom Navigation -->
      <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="navigateTo('home')">
          <span class="material-icons-round nav-icon">home</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('myactivity')">
          <span class="material-icons-round nav-icon">list_alt</span>
          <span class="nav-label">Activity</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('myteam')">
          <span class="material-icons-round nav-icon">groups</span>
          <span class="nav-label">Team</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('reports')">
          <span class="material-icons-round nav-icon">download</span>
          <span class="nav-label">Reports</span>
        </a>
        <a href="#" class="nav-item" onclick="navigateTo('profile')">
          <span class="material-icons-round nav-icon">person</span>
          <span class="nav-label">Profile</span>
        </a>
      </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>
  
  <script>
    // App State
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      currentPage: 'home',
      isLoading: false
    };
    
    // Check authentication
    function checkAuth() {
      const savedUser = localStorage.getItem('trackmaster_user');
      const sessionUser = sessionStorage.getItem('trackmaster_session');
      
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          const expiryTime = userData.expiry || 0;
          
          if (Date.now() < expiryTime) {
            appState.currentUser = userData;
            return true;
          } else {
            localStorage.removeItem('trackmaster_user');
          }
        } catch (e) {
          console.error('Error parsing saved user:', e);
        }
      } else if (sessionUser) {
        try {
          appState.currentUser = JSON.parse(sessionUser);
          return true;
        } catch (e) {
          console.error('Error parsing session user:', e);
        }
      }
      
      window.location.href = 'login.html';
      return false;
    }
    
    // Initialize App
    async function initApp() {
      if (!checkAuth()) return;
      
      setupEventListeners();
      await loadPage('home');
      checkInstallPrompt();
    }
    
    // Setup event listeners
    function setupEventListeners() {
      window.addEventListener('online', () => {
        appState.isOnline = true;
        document.getElementById('offlineIndicator').style.display = 'none';
        showToast('You are back online!', 'success');
      });
      
      window.addEventListener('offline', () => {
        appState.isOnline = false;
        document.getElementById('offlineIndicator').style.display = 'flex';
        showToast('You are offline', 'warning');
      });
      
      // Handle back button
      window.addEventListener('popstate', (e) => {
        if (e.state && e.state.page) {
          loadPage(e.state.page, false);
        } else {
          loadPage('home', false);
        }
      });
    }
    
    // Navigation
    async function navigateTo(page, addToHistory = true) {
      appState.currentPage = page;
      
      // Update active nav item
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      
      const navItems = document.querySelectorAll('.nav-item');
      const pageMap = {
        'home': 0,
        'myactivity': 1,
        'myteam': 2,
        'reports': 3,
        'profile': 4
      };
      
      if (pageMap[page] !== undefined) {
        navItems[pageMap[page]].classList.add('active');
      }
      
      if (addToHistory) {
        history.pushState({ page: page }, '', `#${page}`);
      }
      
      await loadPage(page);
    }
    
    // Load page content
    async function loadPage(page) {
      const pageContainer = document.getElementById('currentPage');
      if (!pageContainer) return;
      
      let content = '';
      
      switch(page) {
        case 'home':
          content = await loadDashboard();
          break;
        case 'myactivity':
          content = await loadMyActivity();
          break;
        case 'myteam':
          content = await loadMyTeam();
          break;
        case 'reports':
          content = loadReports();
          break;
        case 'profile':
          content = loadProfile();
          break;
        case 'newactivity':
          window.location.href = 'newactivity.html';
          return;
        default:
          content = await loadDashboard();
      }
      
      pageContainer.innerHTML = content;
    }
    
    // Load Dashboard
    async function loadDashboard() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.getDashboardStats(appState.currentUser.staffId);
        document.getElementById('loading').style.display = 'none';
        
        if (result.success) {
          const stats = result.stats;
          return `
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <span class="material-icons-round">dashboard</span>
                  Welcome, ${appState.currentUser.name}
                </h3>
              </div>
              <div class="stats-grid">
                <div class="stat-card">
                  <div class="stat-value">${stats.weekly}</div>
                  <div class="stat-label">This Week</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.monthly}</div>
                  <div class="stat-label">This Month</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.total}</div>
                  <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.pending}</div>
                  <div class="stat-label">Pending</div>
                </div>
              </div>
            </div>
            
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <span class="material-icons-round">pie_chart</span>
                  Activity Breakdown
                </h3>
              </div>
              <div class="stats-grid">
                ${Object.entries(stats.typeBreakdown).map(([type, count]) => `
                  <div class="stat-card">
                    <div class="stat-value">${count}</div>
                    <div class="stat-label">${type}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        } else {
          return '<div class="card">Error loading dashboard</div>';
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        return '<div class="card">Error loading dashboard</div>';
      }
    }
    
    // Load My Activity
    async function loadMyActivity() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, 'all');
        document.getElementById('loading').style.display = 'none';
        
        if (result.success && result.activities.length > 0) {
          // Group activities by month
          const grouped = {};
          result.activities.forEach(activity => {
            const date = new Date(activity.date);
            const monthYear = `${date.toLocaleString('default', { month: 'long' })} ${date.getFullYear()}`;
            if (!grouped[monthYear]) grouped[monthYear] = [];
            grouped[monthYear].push(activity);
          });
          
          let html = `
            <div class="filter-bar">
              <button class="filter-chip active" onclick="filterActivities('all')">All</button>
              <button class="filter-chip" onclick="filterActivities('weekly')">This Week</button>
              <button class="filter-chip" onclick="filterActivities('monthly')">This Month</button>
            </div>
          `;
          
          Object.entries(grouped).forEach(([month, activities]) => {
            html += `
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">${month}</h3>
                  <span class="activity-day">${activities.length} activities</span>
                </div>
                <div class="activity-list">
                  ${activities.map(activity => `
                    <div class="activity-item ${activity.status === 'Pending Approval' ? 'pending' : ''}" onclick="editActivity('${activity.rowId}')">
                      <div class="activity-header">
                        <span class="activity-date">${activity.date}</span>
                        <span class="activity-day" style="color: ${activity.status === 'Approved' ? 'var(--success)' : 'var(--warning)'}">
                          ${activity.status}
                        </span>
                      </div>
                      <div class="activity-description">${activity.description}</div>
                      <div class="activity-meta">
                        ${activity.location ? `
                          <span class="activity-meta-item">
                            <span class="material-icons-round" style="font-size: 16px;">location_on</span>
                            ${activity.location}
                          </span>
                        ` : ''}
                        ${activity.teamMembers.length > 0 ? `
                          <span class="activity-meta-item">
                            <span class="material-icons-round" style="font-size: 16px;">groups</span>
                            ${activity.teamMembers.length} member(s)
                          </span>
                        ` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          });
          
          return html;
        } else {
          return `
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">No Activities Found</h3>
              </div>
              <div style="text-align: center; padding: 40px 20px; color: var(--outline);">
                <span class="material-icons-round" style="font-size: 48px; margin-bottom: 16px;">assignment</span>
                <p>You haven't added any activities yet.</p>
                <button class="btn btn-primary" onclick="window.location.href='newactivity.html'" style="margin-top: 20px;">
                  <span class="material-icons-round">add</span>
                  Add New Activity
                </button>
              </div>
            </div>
          `;
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        return '<div class="card">Error loading activities</div>';
      }
    }
    
    // Load My Team
    async function loadMyTeam() {
      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.getTeamMembers();
        document.getElementById('loading').style.display = 'none';
        
        if (result.success) {
          return `
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <span class="material-icons-round">groups</span>
                  Team Members (${result.members.length})
                </h3>
              </div>
              <div class="team-grid">
                ${result.members.map(member => `
                  <div class="team-member" onclick="viewMemberProfile('${member.staffId}')">
                    <div class="member-header">
                      <div class="member-avatar" style="background: ${getAvatarColor(member.staffId)}">
                        ${member.name.split(' ').map(n => n[0]).join('')}
                      </div>
                      <div class="member-info">
                        <h4>${member.name}</h4>
                        <div class="member-role">${member.designation || 'Team Member'}</div>
                      </div>
                    </div>
                    <div class="member-id">${member.staffId}</div>
                    <div class="member-contact">${member.contactNo || 'No contact'}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        } else {
          return '<div class="card">Error loading team</div>';
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        return '<div class="card">Error loading team</div>';
      }
    }
    
    // Load Reports
    function loadReports() {
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <span class="material-icons-round">assessment</span>
              Generate Report
            </h3>
          </div>
          
          <div class="form-group">
            <label class="form-label">Report Type</label>
            <div style="display: flex; gap: var(--spacing-md);">
              <label style="flex: 1;">
                <input type="radio" name="reportType" value="weekly" checked> Weekly
              </label>
              <label style="flex: 1;">
                <input type="radio" name="reportType" value="monthly"> Monthly
              </label>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Format</label>
            <div style="display: flex; gap: var(--spacing-md);">
              <label style="flex: 1;">
                <input type="radio" name="format" value="csv" checked> CSV
              </label>
              <label style="flex: 1;">
                <input type="radio" name="format" value="preview"> Preview
              </label>
            </div>
          </div>
          
          <button class="btn btn-primary btn-full" onclick="generateReport()">
            <span class="material-icons-round">download</span>
            Generate Report
          </button>
        </div>
        
        <div id="reportPreview" style="display: none;"></div>
      `;
    }
    
    // Load Profile
    function loadProfile() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      const user = appState.currentUser;
      
      return `
        <div class="card" style="text-align: center;">
          <div class="member-avatar" style="width: 80px; height: 80px; margin: 0 auto var(--spacing-lg); font-size: 32px;">
            ${user.name.split(' ').map(n => n[0]).join('')}
          </div>
          <h2 style="margin-bottom: var(--spacing-sm);">${user.name}</h2>
          <p style="color: var(--outline); margin-bottom: var(--spacing-lg);">${user.designation || 'Team Member'}</p>
        </div>
        
        <div class="card">
          <div class="info-item" style="display: flex; justify-content: space-between; padding: var(--spacing-md) 0; border-bottom: 1px solid var(--outline);">
            <span style="color: var(--outline);">Staff ID</span>
            <span style="font-weight: 500;">${user.staffId}</span>
          </div>
          <div class="info-item" style="display: flex; justify-content: space-between; padding: var(--spacing-md) 0; border-bottom: 1px solid var(--outline);">
            <span style="color: var(--outline);">Email</span>
            <span style="font-weight: 500;">${user.email || 'Not provided'}</span>
          </div>
          <div class="info-item" style="display: flex; justify-content: space-between; padding: var(--spacing-md) 0;">
            <span style="color: var(--outline);">Contact</span>
            <span style="font-weight: 500;">${user.contactNo || 'Not provided'}</span>
          </div>
        </div>
        
        <button class="btn btn-secondary btn-full" onclick="logout()" style="margin-top: var(--spacing-lg);">
          <span class="material-icons-round">logout</span>
          Logout
        </button>
      `;
    }
    
    // Filter activities
    async function filterActivities(filter) {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.remove('active');
      });
      event.target.classList.add('active');
      
      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, filter);
        document.getElementById('loading').style.display = 'none';
        
        if (result.success) {
          // Refresh the activity list
          await loadPage('myactivity');
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        showToast('Error filtering activities', 'error');
      }
    }
    
    // Generate report
    async function generateReport() {
      if (!appState.currentUser) return;
      
      const reportType = document.querySelector('input[name="reportType"]:checked')?.value || 'weekly';
      const format = document.querySelector('input[name="format"]:checked')?.value || 'csv';
      
      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.generateReport(
          appState.currentUser.staffId,
          reportType,
          format,
          new Date().getMonth(),
          new Date().getFullYear()
        );
        
        document.getElementById('loading').style.display = 'none';
        
        if (result.success) {
          if (format === 'csv' && result.data) {
            // Download CSV
            const blob = new Blob([result.data], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = result.filename || `report_${reportType}_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            showToast('Report downloaded successfully!', 'success');
          } else if (result.activities) {
            // Show preview
            showReportPreview(result.activities);
          }
        } else {
          showToast(result.message || 'Error generating report', 'error');
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        showToast('Error generating report', 'error');
      }
    }
    
    // Show report preview
    function showReportPreview(activities) {
      const previewDiv = document.getElementById('reportPreview');
      
      if (activities.length === 0) {
        previewDiv.innerHTML = `
          <div class="card">
            <p style="text-align: center; color: var(--outline);">No activities found for this period</p>
          </div>
        `;
      } else {
        previewDiv.innerHTML = `
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Report Preview (${activities.length} activities)</h3>
            </div>
            <div class="report-preview">
              <table class="preview-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Location</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${activities.map(a => `
                    <tr>
                      <td>${a.date}</td>
                      <td>${a.description.substring(0, 30)}${a.description.length > 30 ? '...' : ''}</td>
                      <td>${a.location || 'N/A'}</td>
                      <td>${a.status}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }
      
      previewDiv.style.display = 'block';
    }
    
    // Helper function for avatar colors
    function getAvatarColor(id) {
      const colors = ['#6750A4', '#0D904F', '#DC3545', '#FFC107', '#17A2B8'];
      const index = id.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
      return colors[index];
    }
    
    // Edit activity
    function editActivity(rowId) {
      // Store activity ID and navigate to edit page
      sessionStorage.setItem('editActivityId', rowId);
      window.location.href = 'newactivity.html?edit=' + rowId;
    }
    
    // View member profile
    function viewMemberProfile(staffId) {
      showToast('Viewing member: ' + staffId, 'info');
      // Implement member profile view
    }
    
    // Refresh data
    async function refreshData() {
      showToast('Refreshing data...', 'info');
      await loadPage(appState.currentPage);
    }
    
    // Show notifications
    function showNotifications() {
      showToast('No new notifications', 'info');
    }
    
    // Logout
    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('trackmaster_user');
        sessionStorage.removeItem('trackmaster_session');
        window.location.href = 'login.html';
      }
    }
    
    // Show toast
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      
      const container = document.getElementById('toastContainer');
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Check install prompt
    function checkInstallPrompt() {
      // PWA install prompt logic
    }
    
    // Initialize on load
    window.onload = initApp;
  </script>
</body>
</html>
